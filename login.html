<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Kova Auth</title>
    <link rel="stylesheet" href="assets/css/auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-box">
            <h1>KOVA</h1>
            <p class="auth-subtitle">Sign in to your account</p>

            <div id="errorMessage" class="auth-error" style="display: none;"></div>

            <div id="verifyBar" style="display:none; padding:0.75rem; border-radius:6px; margin-bottom:1rem; background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.2); text-align:center;">
                <p style="font-size:0.8rem; color:#f59e0b; margin-bottom:0.5rem;">Email not verified yet.</p>
                <button type="button" id="resendBtn" onclick="resendVerification()" style="background:none; border:1px solid rgba(245,158,11,0.3); color:#f59e0b; padding:0.4rem 0.75rem; border-radius:4px; font-size:0.75rem; font-weight:600; cursor:pointer; font-family:inherit;">
                    Resend Verification Email
                </button>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="auth-input-group">
                    <label for="email">Email</label>
                    <div class="auth-input-wrap">
                        <i data-lucide="mail"></i>
                        <input type="email" id="email" placeholder="Email address" required autocomplete="email">
                    </div>
                </div>

                <div class="auth-input-group">
                    <label for="password">Password</label>
                    <div class="auth-input-wrap">
                        <i data-lucide="lock"></i>
                        <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i data-lucide="eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-btn" id="loginBtn">
                    <span class="btn-text">
                        Sign In
                        <i data-lucide="arrow-right"></i>
                    </span>
                    <span class="btn-loader" style="display: none;">
                        <i data-lucide="loader-2" class="spinning"></i>
                        Signing in...
                    </span>
                </button>
            </form>

            <div class="auth-divider">or</div>

            <button type="button" id="googleBtn" class="google-btn" onclick="googleSignIn()">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>

            <div class="auth-footer">
                Don't have an account? <a href="signup">Sign up</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendEmailVerification, signOut, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getDatabase, ref, get, set } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCtwFdPJ5JQea9rJ0YWU5cEW3R_Rq_DmL4",
            authDomain: "kova-42298.firebaseapp.com",
            databaseURL: "https://kova-42298-default-rtdb.firebaseio.com",
            projectId: "kova-42298",
            storageBucket: "kova-42298.firebasestorage.app",
            messagingSenderId: "313177213542",
            appId: "1:313177213542:web:8c6d7f3dc203c4bb9ffba7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const googleProvider = new GoogleAuthProvider();

        await setPersistence(auth, browserLocalPersistence);

        auth.onAuthStateChanged((user) => {
            if (user && (user.emailVerified || user.providerData.some(p => p.providerId === 'google.com'))) {
                window.location.href = 'dashboard';
            }
        });

        function generateHex(len) {
            const c = 'abcdef0123456789';
            let r = '';
            for (let i = 0; i < len; i++) r += c[Math.floor(Math.random() * c.length)];
            return r;
        }

        window.googleSignIn = async function() {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.style.display = 'none';
            const btn = document.getElementById('googleBtn');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                // Create profile if first time
                const snap = await get(ref(db, 'users/' + user.uid));
                if (!snap.exists()) {
                    await set(ref(db, 'users/' + user.uid), {
                        username: user.displayName || user.email.split('@')[0],
                        email: user.email,
                        ownerId: generateHex(16),
                        plan: 'free',
                        licenseLimit: 5,
                        createdAt: Date.now()
                    });
                }

                window.location.href = 'dashboard';
            } catch (error) {
                console.error('Google sign-in error:', error);
                if (error.code !== 'auth/popup-closed-by-user') {
                    errorMessage.textContent = 'Google sign-in failed. Try again.';
                    errorMessage.style.display = 'block';
                }
                btn.disabled = false;
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Continue with Google';
            }
        };

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            
            loginBtn.disabled = true;
            loginBtn.querySelector('.btn-text').style.display = 'none';
            loginBtn.querySelector('.btn-loader').style.display = 'flex';
            errorMessage.style.display = 'none';
            
            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);

                if (!cred.user.emailVerified) {
                    // Not verified — sign out and block
                    await signOut(auth);
                    document.getElementById('verifyBar').style.display = 'block';
                    window._unverifiedEmail = email;
                    window._unverifiedPassword = password;
                    throw { code: 'auth/email-not-verified', message: 'Please verify your email before signing in.' };
                }
            } catch (error) {
                console.error('Login error:', error);
                
                let errorMsg = 'Invalid email or password';
                if (error.code === 'auth/email-not-verified') {
                    errorMsg = 'Please verify your email before signing in';
                } else if (error.code === 'auth/user-not-found') {
                    errorMsg = 'No account found with this email';
                } else if (error.code === 'auth/wrong-password') {
                    errorMsg = 'Incorrect password';
                } else if (error.code === 'auth/invalid-email') {
                    errorMsg = 'Invalid email format';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMsg = 'Too many failed attempts. Try again later';
                }
                
                errorMessage.textContent = errorMsg;
                errorMessage.style.display = 'block';
                
                loginBtn.disabled = false;
                loginBtn.querySelector('.btn-text').style.display = 'flex';
                loginBtn.querySelector('.btn-loader').style.display = 'none';
            }
        });
    </script>

    <script type="module">
        import { getAuth, signInWithEmailAndPassword, sendEmailVerification, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        // Google sign-in is handled in the main script block above.

        window.resendVerification = async function() {
            const btn = document.getElementById('resendBtn');
            const email = window._unverifiedEmail;
            const password = window._unverifiedPassword;

            if (!email || !password) {
                alert('Please try signing in first.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const auth = getAuth();
                const cred = await signInWithEmailAndPassword(auth, email, password);
                await sendEmailVerification(cred.user);
                await signOut(auth);

                btn.textContent = 'Verification email sent!';
                btn.style.color = '#10b981';
                btn.style.borderColor = 'rgba(16,185,129,0.3)';

                setTimeout(() => {
                    btn.textContent = 'Resend Verification Email';
                    btn.style.color = '#f59e0b';
                    btn.style.borderColor = 'rgba(245,158,11,0.3)';
                    btn.disabled = false;
                }, 5000);
            } catch (err) {
                console.error('Resend error:', err);
                btn.textContent = 'Failed — try again';
                btn.disabled = false;
            }
        };
    </script>

    <script>
        window.togglePassword = function() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
        });
    </script>
</body>
</html>
