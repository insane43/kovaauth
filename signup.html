<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Kova Auth</title>
    <link rel="stylesheet" href="assets/css/auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-box">
            <h1>KOVA</h1>
            <p class="auth-subtitle">Create your account</p>

            <div id="errorMessage" class="auth-error" style="display: none;"></div>
            <div id="successMessage" class="auth-success" style="display: none;"></div>

            <form id="signupForm" class="auth-form">
                <div class="auth-input-group">
                    <label for="username">Username</label>
                    <div class="auth-input-wrap">
                        <i data-lucide="user"></i>
                        <input type="text" id="username" placeholder="Username" required minlength="3" maxlength="20" autocomplete="username">
                    </div>
                </div>

                <div class="auth-input-group">
                    <label for="email">Email</label>
                    <div class="auth-input-wrap">
                        <i data-lucide="mail"></i>
                        <input type="email" id="email" placeholder="Email address" required autocomplete="email">
                    </div>
                </div>

                <div class="auth-input-group">
                    <label for="password">Password</label>
                    <div class="auth-input-wrap">
                        <i data-lucide="lock"></i>
                        <input type="password" id="password" placeholder="Password (min 6 characters)" required minlength="6" autocomplete="new-password">
                        <button type="button" class="toggle-password" onclick="togglePassword('password', 'eyeIcon1')">
                            <i data-lucide="eye" id="eyeIcon1"></i>
                        </button>
                    </div>
                </div>

                <div class="auth-input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="auth-input-wrap">
                        <i data-lucide="lock"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm password" required minlength="6" autocomplete="new-password">
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', 'eyeIcon2')">
                            <i data-lucide="eye" id="eyeIcon2"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-btn" id="signupBtn">
                    <span class="btn-text">
                        Create Account
                        <i data-lucide="arrow-right"></i>
                    </span>
                    <span class="btn-loader" style="display: none;">
                        <i data-lucide="loader-2" class="spinning"></i>
                        Creating...
                    </span>
                </button>
            </form>

            <div id="googleSection">
                <div class="auth-divider">or</div>
                <button type="button" id="googleBtn" class="google-btn" onclick="googleSignUp()">
                    <svg width="18" height="18" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>
            </div>

            <!-- Verification Prompt (shown after signup) -->
            <div id="verifyPrompt" style="display:none; text-align:center;">
                <div style="width:56px; height:56px; background:rgba(0,200,100,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem;">
                    <i data-lucide="mail-check" style="color:#00c864; width:28px; height:28px;"></i>
                </div>
                <h2 style="font-size:1.1rem; font-weight:700; color:#ffffff; margin-bottom:0.5rem;">Verify Your Email</h2>
                <p style="font-size:0.8rem; color:#888888; line-height:1.6; margin-bottom:1rem;">
                    We've sent a verification link to<br>
                    <strong style="color:#ffffff;" id="verifyEmail"></strong>
                </p>
                <p style="font-size:0.75rem; color:#555555; margin-bottom:1.5rem;">
                    Check your inbox (and spam folder) and click the link to activate your account.
                </p>
                <a href="login" class="auth-btn" style="text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.4rem;">
                    <i data-lucide="log-in" style="width:16px; height:16px;"></i>
                    Go to Sign In
                </a>
            </div>

            <div class="auth-footer">
                Already have an account? <a href="login">Sign in</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, updateProfile, sendEmailVerification, signOut, signInWithPopup, GoogleAuthProvider, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getDatabase, ref, set, get } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCtwFdPJ5JQea9rJ0YWU5cEW3R_Rq_DmL4",
            authDomain: "kova-42298.firebaseapp.com",
            databaseURL: "https://kova-42298-default-rtdb.firebaseio.com",
            projectId: "kova-42298",
            storageBucket: "kova-42298.firebasestorage.app",
            messagingSenderId: "313177213542",
            appId: "1:313177213542:web:8c6d7f3dc203c4bb9ffba7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const googleProvider = new GoogleAuthProvider();

        await setPersistence(auth, browserLocalPersistence);

        // Redirect if already logged in and verified
        auth.onAuthStateChanged((user) => {
            if (user && (user.emailVerified || user.providerData.some(p => p.providerId === 'google.com'))) {
                window.location.href = 'dashboard';
            }
        });

        function generateOwnerId() {
            const chars = 'abcdef0123456789';
            let result = '';
            for (let i = 0; i < 16; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        window.googleSignUp = async function() {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.style.display = 'none';
            const btn = document.getElementById('googleBtn');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                // Create profile if first time
                const snap = await get(ref(db, 'users/' + user.uid));
                if (!snap.exists()) {
                    await set(ref(db, 'users/' + user.uid), {
                        username: user.displayName || user.email.split('@')[0],
                        email: user.email,
                        ownerId: generateOwnerId(),
                        plan: 'free',
                        licenseLimit: 5,
                        createdAt: Date.now()
                    });
                }

                window.location.href = 'dashboard';
            } catch (error) {
                console.error('Google sign-up error:', error);
                if (error.code !== 'auth/popup-closed-by-user') {
                    errorMessage.textContent = 'Google sign-in failed. Try again.';
                    errorMessage.style.display = 'block';
                }
                btn.disabled = false;
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Continue with Google';
            }
        };

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const signupBtn = document.getElementById('signupBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            // Validate username
            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                errorMessage.textContent = 'Username can only contain letters, numbers, and underscores';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Validate passwords match
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Show loading
            signupBtn.disabled = true;
            signupBtn.querySelector('.btn-text').style.display = 'none';
            signupBtn.querySelector('.btn-loader').style.display = 'flex';
            
            try {
                // Create Firebase Auth user
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Update display name
                await updateProfile(user, { displayName: username });
                
                // Create user profile in Realtime Database
                const ownerId = generateOwnerId();
                await set(ref(db, 'users/' + user.uid), {
                    username: username,
                    email: email,
                    ownerId: ownerId,
                    plan: 'free',
                    licenseLimit: 5,
                    createdAt: Date.now()
                });
                
                // Send verification email
                await sendEmailVerification(user);

                // Sign out so they can't access dashboard until verified
                await signOut(auth);

                // Hide form, show verification prompt
                document.getElementById('signupForm').style.display = 'none';
                document.getElementById('googleSection').style.display = 'none';
                document.getElementById('verifyPrompt').style.display = 'block';
                document.getElementById('verifyEmail').textContent = email;
                
            } catch (error) {
                console.error('Signup error:', error);
                
                let errorMsg = 'Failed to create account';
                if (error.code === 'auth/email-already-in-use') {
                    errorMsg = 'An account with this email already exists';
                } else if (error.code === 'auth/invalid-email') {
                    errorMsg = 'Invalid email address';
                } else if (error.code === 'auth/weak-password') {
                    errorMsg = 'Password must be at least 6 characters';
                }
                
                errorMessage.textContent = errorMsg;
                errorMessage.style.display = 'block';
                
                signupBtn.disabled = false;
                signupBtn.querySelector('.btn-text').style.display = 'flex';
                signupBtn.querySelector('.btn-loader').style.display = 'none';
            }
        });
    </script>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
        });
    </script>
</body>
</html>
